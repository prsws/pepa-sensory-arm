name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/unit/ tests/integration/ --ignore=tests/integration/test_real_llm.py --ignore=tests/integration/test_real_memory.py --ignore=tests/integration/test_real_vector_db.py --ignore=tests/integration/test_real_ttft_metrics.py -v --cov=custom_components.pepa_sensory_arm --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt

      - name: Run black
        run: |
          black --check custom_components/ tests/

      - name: Run isort
        run: |
          isort --check custom_components/ tests/

      - name: Run flake8
        run: |
          flake8 custom_components/ tests/

  validate-manifest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Validate manifest.json
        run: |
          python -c "import json; json.load(open('custom_components/pepa_sensory_arm/manifest.json'))"
